[project]
name = "youtube-tts"
version = "0.1.0"
description = "YouTube LiveのチャットコメントをリアルタイムにVOICEVOXで読み上げるツール"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "google-api-python-client>=2.197.0",
    "google-auth>=2.55.0",
    "google-auth-oauthlib>=1.4.0",
    "google-cloud-monitoring>=2.31.0",
    "numpy>=2.4.6",
    "obs-websocket-py>=1.0",
    "requests>=2.34.2",
    "sounddevice>=0.5.5",
]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
]
